<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<!-- ===== APP NAME: change the line below and the <h1 class="title"> to rename ===== -->
<title>Olivia's Lab</title>
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Olivia's Lab">
<meta name="theme-color" content="#10162a">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧪</text></svg>">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%237d4fd1'/><text x='50' y='52' font-size='62' text-anchor='middle' dominant-baseline='central'>🧪</text></svg>">
<style>
  :root{
    --ink:#f4f6fb; --dark:#10162a; --panel:#1d2640;
    --ring:#ffd23f;
    --pink:#ff5da2; --pink2:#ff8fc0;
    --green:#3ec96b; --green2:#7be39a;
    --purple:#9b5de5; --purple2:#c39bff;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;overflow:hidden;
    font-family:ui-rounded,"SF Pro Rounded",system-ui,"Segoe UI",Roboto,Arial,sans-serif;
    -webkit-user-select:none;user-select:none;touch-action:manipulation;color:var(--ink);}
  #app{position:relative;height:100dvh;width:100vw;overflow:hidden;}

  .screen{position:absolute;inset:0;display:none;flex-direction:column;}
  .screen.active{display:flex;}

  .iconbtn{min-width:56px;height:56px;padding:0 12px;border:none;border-radius:16px;
    background:#39456a;color:var(--ink);font-size:26px;font-weight:800;cursor:pointer;
    display:flex;align-items:center;justify-content:center;gap:6px;transition:transform .08s,background .15s;}
  .iconbtn:active{transform:scale(.9);}
  .iconbtn.sel{background:var(--ring);color:#1d2433;box-shadow:0 0 0 3px rgba(255,210,63,.4);}
  .iconbtn small{font-size:14px;font-weight:900;letter-spacing:.4px;}

  /* ============ HOME ============ */
  #home{justify-content:center;align-items:center;text-align:center;
    background:radial-gradient(120% 120% at 50% 0%, #25315a 0%, #131a30 55%, #0c1124 100%);}
  #home .title{font-size:clamp(40px,9vw,84px);font-weight:900;margin:0;
    letter-spacing:-1px;line-height:1;
    background:linear-gradient(90deg,#ffd23f,#ff8fc0,#9b5de5,#5ec6ff);
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
    text-shadow:0 6px 30px rgba(155,93,229,.25);}
  #home .sub{margin:14px 0 34px;font-size:clamp(15px,3.4vw,20px);font-weight:800;color:#aeb9da;}
  #home .sub .heart{color:#ff5da2;}
  .tiles{display:grid;gap:20px;grid-template-columns:repeat(3,1fr);width:min(960px,92vw);
    padding:0 4px;z-index:2;}
  @media(max-width:720px){.tiles{grid-template-columns:1fr;width:min(440px,92vw);}}
  .tile{border:none;cursor:pointer;border-radius:28px;padding:30px 18px 26px;
    color:#fff;font-weight:900;display:flex;flex-direction:column;align-items:center;gap:8px;
    box-shadow:0 14px 34px rgba(0,0,0,.38);transition:transform .12s;}
  .tile:active{transform:scale(.95);}
  .tile .emoji{font-size:clamp(48px,11vw,72px);line-height:1;filter:drop-shadow(0 6px 10px rgba(0,0,0,.25));}
  .tile .name{font-size:clamp(20px,4.5vw,26px);}
  .tile .desc{font-size:13px;font-weight:800;opacity:.92;}
  .t-art{background:linear-gradient(160deg,var(--pink2),var(--pink));}
  .t-game{background:linear-gradient(160deg,var(--green2),var(--green));}
  .t-abc{background:linear-gradient(160deg,var(--purple2),var(--purple));}
  .floaty{position:absolute;font-size:clamp(28px,5vw,46px);opacity:.5;z-index:1;
    animation:bob 6s ease-in-out infinite;}
  @keyframes bob{0%,100%{transform:translateY(0) rotate(-6deg);}50%{transform:translateY(-18px) rotate(6deg);}}
  @media(prefers-reduced-motion:reduce){.floaty{animation:none;}}

  /* ============ shared activity header ============ */
  .topbar{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--panel);
    box-shadow:0 4px 14px rgba(0,0,0,.3);z-index:6;flex-wrap:wrap;}
  .group{display:flex;gap:7px;align-items:center;background:#26314f;padding:7px;border-radius:16px;}
  .group.scroll{overflow-x:auto;max-width:100%;-webkit-overflow-scrolling:touch;scrollbar-width:thin;}

  /* ============ DOODLE ============ */
  .swatch{width:40px;height:40px;border-radius:50%;border:3px solid rgba(255,255,255,.15);
    cursor:pointer;transition:transform .08s;flex:0 0 auto;}
  .swatch:active{transform:scale(.9);}
  .swatch.sel{border-color:var(--ring);transform:scale(1.12);box-shadow:0 0 0 3px rgba(255,210,63,.35);}
  .dot{border-radius:50%;background:currentColor;}
  #paper{flex:1;position:relative;background:#fffdf7;overflow:hidden;}
  #doodleCanvas{position:absolute;inset:0;width:100%;height:100%;touch-action:none;display:block;}
  #ask{position:absolute;inset:0;background:rgba(16,22,42,.6);display:none;align-items:center;justify-content:center;z-index:20;}
  #ask.on{display:flex;}
  #askbox{background:#fff;border-radius:24px;padding:26px 28px;text-align:center;max-width:340px;color:#1d2433;box-shadow:0 20px 60px rgba(0,0,0,.4);}
  #askbox h2{margin:0 0 18px;font-size:23px;}
  #askbox .row{display:flex;gap:12px;}
  #askbox button{flex:1;border:none;border-radius:16px;padding:16px;font-size:18px;font-weight:900;cursor:pointer;}
  .yes{background:#ff5d5d;color:#fff;}.no{background:#e9edf5;color:#1d2433;}

  /* ============ VIRUS HUNT ============ */
  #virus{background:
     radial-gradient(60% 50% at 30% 20%, rgba(80,200,255,.10), transparent 60%),
     radial-gradient(70% 60% at 75% 70%, rgba(140,255,170,.10), transparent 60%),
     radial-gradient(120% 120% at 50% 50%, #0e2433, #07131c 70%, #050b12);}
  #virusBar{display:flex;align-items:center;gap:12px;padding:10px 12px;z-index:6;}
  .badge{background:rgba(0,0,0,.35);border:2px solid rgba(255,255,255,.18);border-radius:18px;
    padding:8px 16px;font-size:22px;font-weight:900;color:#dffaff;}
  #arena{flex:1;position:relative;overflow:hidden;}
  #virusCanvas{position:absolute;inset:0;width:100%;height:100%;touch-action:none;}
  #vtoast{position:absolute;top:18%;left:50%;transform:translate(-50%,0);
    font-size:clamp(34px,9vw,64px);font-weight:900;color:#fff;text-shadow:0 4px 20px rgba(0,0,0,.5);
    opacity:0;pointer-events:none;transition:opacity .25s, transform .25s;z-index:7;white-space:nowrap;}
  #vtoast.show{opacity:1;transform:translate(-50%,-10px);}
  #vhint{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);
    color:#bfe9f5;font-weight:800;font-size:15px;opacity:.8;z-index:7;pointer-events:none;text-align:center;}

  /* ============ LETTER LAND ============ */
  #letters{background:radial-gradient(120% 120% at 50% 0%, #2a2350, #15122b 60%, #0d0a1c);}
  #letterContent{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px;}
  .sub-view{display:none;}
  .sub-view.on{display:block;}

  /* word builder */
  #wordStrip{min-height:96px;display:flex;flex-wrap:wrap;gap:8px;justify-content:center;align-items:center;
    background:rgba(255,255,255,.07);border:3px dashed rgba(255,255,255,.22);border-radius:20px;
    padding:14px;margin:0 auto 16px;width:min(820px,96%);}
  #wordStrip .ph{color:#a99fd0;font-weight:800;font-size:18px;}
  .wtile{width:60px;height:74px;border-radius:14px;background:#ffd23f;color:#3a2b00;
    font-size:42px;font-weight:900;display:flex;align-items:center;justify-content:center;
    box-shadow:0 6px 0 #c9a417;cursor:pointer;}
  .wctrl{display:flex;gap:10px;justify-content:center;margin-bottom:16px;flex-wrap:wrap;}
  .tray{display:grid;grid-template-columns:repeat(auto-fit,minmax(58px,1fr));gap:10px;
    width:min(820px,96%);margin:0 auto;}
  .ltile{aspect-ratio:1/1;border:none;border-radius:16px;font-size:clamp(26px,6vw,38px);font-weight:900;
    background:linear-gradient(160deg,#c39bff,#9b5de5);color:#fff;cursor:pointer;
    box-shadow:0 6px 0 rgba(0,0,0,.25);transition:transform .07s;touch-action:none;}
  .ltile:active{transform:translateY(3px) scale(.97);box-shadow:0 3px 0 rgba(0,0,0,.25);}
  .ghost{position:fixed;z-index:50;pointer-events:none;width:64px;height:64px;border-radius:16px;
    display:flex;align-items:center;justify-content:center;font-size:38px;font-weight:900;color:#fff;
    background:linear-gradient(160deg,#c39bff,#9b5de5);box-shadow:0 10px 24px rgba(0,0,0,.4);
    transform:translate(-50%,-50%) scale(1.1);}

  /* flashcards */
  #flash{display:flex;flex-direction:column;align-items:center;gap:18px;padding-top:8px;}
  #card{width:min(420px,90%);aspect-ratio:3/4;border-radius:32px;cursor:pointer;
    background:linear-gradient(160deg,#fff,#f1ecff);color:#2a1a4a;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;
    box-shadow:0 18px 50px rgba(0,0,0,.45);}
  #card .big{font-size:clamp(110px,30vw,190px);font-weight:900;line-height:.9;}
  #card .pic{font-size:clamp(80px,22vw,140px);line-height:1;}
  #card .word{font-size:clamp(28px,7vw,44px);font-weight:900;}
  .fctrl{display:flex;gap:14px;align-items:center;}
  .bigbtn{min-width:70px;height:64px;padding:0 18px;border:none;border-radius:18px;font-size:26px;font-weight:900;
    background:#39456a;color:#fff;cursor:pointer;}
  .bigbtn:active{transform:scale(.93);}
  .bigbtn.say{background:linear-gradient(160deg,#7be39a,#3ec96b);color:#08350f;}
</style>
</head>
<body>
<div id="app">

  <!-- ================= HOME ================= -->
  <div id="home" class="screen active">
    <span class="floaty" style="top:12%;left:10%">🦠</span>
    <span class="floaty" style="top:20%;right:12%;animation-delay:1.5s">🔬</span>
    <span class="floaty" style="bottom:14%;left:14%;animation-delay:.8s">⭐</span>
    <span class="floaty" style="bottom:18%;right:10%;animation-delay:2.2s">🧪</span>
    <h1 class="title">Olivia's Lab</h1>
    <p class="sub">Made just for Olivia <span class="heart">♥</span> &nbsp;Now you're 4!</p>
    <div class="tiles">
      <button class="tile t-art"  onclick="show('doodle')"><span class="emoji">🎨</span><span class="name">Doodle Pad</span><span class="desc">Paint & stamps</span></button>
      <button class="tile t-game" onclick="show('virus')"><span class="emoji">🦠</span><span class="name">Virus Hunt</span><span class="desc">Zap the germs!</span></button>
      <button class="tile t-abc"  onclick="show('letters')"><span class="emoji">🔤</span><span class="name">Letter Land</span><span class="desc">Build words & cards</span></button>
    </div>
  </div>

  <!-- ================= DOODLE ================= -->
  <div id="doodle" class="screen">
    <div class="topbar">
      <button class="iconbtn" onclick="show('home')">🏠</button>
      <div class="group" id="colors"></div>
      <div class="group" id="sizes"></div>
      <div class="group" id="tools">
        <button class="iconbtn sel" data-tool="brush" title="Brush">🖌️</button>
        <button class="iconbtn" data-tool="rainbow" title="Rainbow">🌈</button>
        <button class="iconbtn" data-tool="sparkle" title="Sparkle">✨</button>
        <button class="iconbtn" data-tool="eraser" title="Eraser">🧽</button>
      </div>
      <div class="group scroll" id="stamps"></div>
      <div class="group">
        <button class="iconbtn" id="undo" title="Undo">↩️</button>
        <button class="iconbtn" id="clearD" title="Clear">🗑️</button>
        <button class="iconbtn" id="saveD" title="Save">💾</button>
      </div>
    </div>
    <div id="paper">
      <canvas id="doodleCanvas"></canvas>
      <div id="ask">
        <div id="askbox"><h2>Clear the whole page?</h2>
          <div class="row"><button class="no" id="askNo">Keep it</button><button class="yes" id="askYes">Yes, clear</button></div>
        </div>
      </div>
    </div>
  </div>

  <!-- ================= VIRUS HUNT ================= -->
  <div id="virus" class="screen">
    <div id="virusBar">
      <button class="iconbtn" onclick="show('home')">🏠</button>
      <div class="badge">🦠 Zapped: <span id="vscore">0</span></div>
      <button class="iconbtn" id="vrestart" title="Start over">🔁</button>
    </div>
    <div id="arena">
      <canvas id="virusCanvas"></canvas>
      <div id="vtoast"></div>
      <div id="vhint">Tap the germs to zap them! 🔫</div>
    </div>
  </div>

  <!-- ================= LETTER LAND ================= -->
  <div id="letters" class="screen">
    <div class="topbar">
      <button class="iconbtn" onclick="show('home')">🏠</button>
      <div class="group">
        <button class="iconbtn sel" id="modeBuild"><small>BUILD WORDS</small></button>
        <button class="iconbtn" id="modeCards"><small>FLASHCARDS</small></button>
      </div>
    </div>
    <div id="letterContent">

      <div id="buildView" class="sub-view on">
        <div id="wordStrip"><span class="ph">Tap or drag letters here ✨</span></div>
        <div class="wctrl">
          <button class="bigbtn say" id="sayWord">🔊 Say it</button>
          <button class="bigbtn" id="backspace">⌫</button>
          <button class="bigbtn" id="clearWord">🗑️ Clear</button>
        </div>
        <div class="tray" id="tray"></div>
      </div>

      <div id="cardsView" class="sub-view">
        <div id="flash">
          <div id="card"></div>
          <div class="fctrl">
            <button class="bigbtn" id="prevCard">⬅️</button>
            <button class="bigbtn say" id="sayCard">🔊 Say it</button>
            <button class="bigbtn" id="nextCard">➡️</button>
          </div>
        </div>
      </div>

    </div>
  </div>

</div>

<script>
/* ===================== shared: router ===================== */
function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  Virus.stop();
  if(id==='doodle') Doodle.onShow();
  if(id==='virus')  Virus.start();
  if(id==='letters')Letters.onShow();
}

/* ===================== shared: sound ===================== */
let AC=null;
function ac(){ if(!AC){ try{AC=new (window.AudioContext||window.webkitAudioContext)();}catch(e){} }
  if(AC&&AC.state==='suspended') AC.resume(); return AC; }
function tone(freq,dur,type,vol,slideTo){
  const c=ac(); if(!c) return;
  const o=c.createOscillator(), g=c.createGain();
  o.type=type||'triangle'; o.frequency.setValueAtTime(freq,c.currentTime);
  if(slideTo) o.frequency.exponentialRampToValueAtTime(slideTo, c.currentTime+dur);
  g.gain.setValueAtTime(vol||0.2,c.currentTime);
  g.gain.exponentialRampToValueAtTime(0.0001, c.currentTime+dur);
  o.connect(g).connect(c.destination); o.start(); o.stop(c.currentTime+dur);
}
const popSound  = ()=>tone(720,0.18,'triangle',0.28,180);
const zapSound  = ()=>tone(160,0.12,'sawtooth',0.16,920);
const cheer     = ()=>[523,659,784,1047].forEach((f,i)=>setTimeout(()=>tone(f,0.2,'triangle',0.22),i*90));
function speak(t){ try{ const u=new SpeechSynthesisUtterance(t); u.rate=0.82; u.pitch=1.12;
  speechSynthesis.cancel(); speechSynthesis.speak(u);}catch(e){} }
window.addEventListener('pointerdown', ()=>ac(), {once:true});

/* ===================== DOODLE PAD ===================== */
const Doodle = (function(){
  const canvas=document.getElementById('doodleCanvas');
  const ctx=canvas.getContext('2d');
  const paper=document.getElementById('paper');
  const state={color:'#ff3b3b',size:14,tool:'brush',stamp:'⭐'};
  let dpr=Math.max(1,Math.min(window.devicePixelRatio||1,3));
  const undoStack=[]; const UNDO_MAX=12;

  function sizeCanvas(){
    const r=paper.getBoundingClientRect();
    if(r.width===0) return;
    const prev=canvas.width?ctx.getImageData(0,0,canvas.width,canvas.height):null;
    canvas.width=Math.round(r.width*dpr); canvas.height=Math.round(r.height*dpr);
    ctx.setTransform(dpr,0,0,dpr,0,0); ctx.lineCap='round'; ctx.lineJoin='round';
    if(prev){try{ctx.save();ctx.setTransform(1,0,0,1,0,0);ctx.putImageData(prev,0,0);ctx.restore();}catch(e){}}
  }
  function pushUndo(){try{undoStack.push(ctx.getImageData(0,0,canvas.width,canvas.height));
    if(undoStack.length>UNDO_MAX)undoStack.shift();}catch(e){}}
  function doUndo(){const img=undoStack.pop();if(!img)return;
    ctx.save();ctx.setTransform(1,0,0,1,0,0);ctx.clearRect(0,0,canvas.width,canvas.height);ctx.putImageData(img,0,0);ctx.restore();}

  const palette=['#ff3b3b','#ff8c00','#ffd23f','#3ec96b','#23b5d3','#3a7bff','#9b5de5','#ff5da2','#7a4b2b','#111111','#9aa3b2','#ffffff'];
  const colorsEl=document.getElementById('colors');
  palette.forEach(c=>{const s=document.createElement('div');s.className='swatch'+(c===state.color?' sel':'');s.style.background=c;
    s.addEventListener('pointerdown',()=>{state.color=c;if(state.tool==='eraser')setTool('brush');
      colorsEl.querySelectorAll('.swatch').forEach(x=>x.classList.remove('sel'));s.classList.add('sel');});colorsEl.appendChild(s);});

  const sizesEl=document.getElementById('sizes');
  [{l:'S',v:6},{l:'M',v:14},{l:'L',v:28},{l:'XL',v:50}].forEach(z=>{
    const b=document.createElement('button');b.className='iconbtn'+(z.v===state.size?' sel':'');const d=Math.min(z.v,30);
    b.innerHTML='<span class="dot" style="width:'+d+'px;height:'+d+'px"></span>';
    b.addEventListener('pointerdown',()=>{state.size=z.v;sizesEl.querySelectorAll('.iconbtn').forEach(x=>x.classList.remove('sel'));b.classList.add('sel');});
    sizesEl.appendChild(b);});

  function setTool(t){state.tool=t;document.querySelectorAll('#tools .iconbtn').forEach(x=>x.classList.toggle('sel',x.dataset.tool===t));
    if(t!=='stamp')document.querySelectorAll('#stamps .iconbtn').forEach(x=>x.classList.remove('sel'));}
  document.querySelectorAll('#tools .iconbtn').forEach(b=>b.addEventListener('pointerdown',()=>setTool(b.dataset.tool)));

  const stampList=['🐶','🐕','🦴','🐾','🔬','🧪','🦠','🧬','🌡️','🐱','🦄','🦋','🐢','🐠','⭐','🌟','❤️','🌈','🌸','🍓','🚀','🌙','☀️','🐞'];
  const stampsEl=document.getElementById('stamps');
  stampList.forEach(em=>{const b=document.createElement('button');b.className='iconbtn';b.textContent=em;
    b.addEventListener('pointerdown',()=>{state.stamp=em;setTool('stamp');
      stampsEl.querySelectorAll('.iconbtn').forEach(x=>x.classList.remove('sel'));b.classList.add('sel');});stampsEl.appendChild(b);});

  let drawing=false,moved=false,prev=null,prevMid=null,hue=0;
  const spk=['#ff3b3b','#ffd23f','#3ec96b','#23b5d3','#9b5de5','#ff5da2','#ff8c00'];
  const pos=e=>{const r=canvas.getBoundingClientRect();return{x:e.clientX-r.left,y:e.clientY-r.top};};
  const mid=(a,b)=>({x:(a.x+b.x)/2,y:(a.y+b.y)/2});
  function placeStamp(p){ctx.save();ctx.globalCompositeOperation='source-over';ctx.font=(state.size*3)+'px serif';
    ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(state.stamp,p.x,p.y);ctx.restore();}
  function sparkleAt(p){ctx.save();ctx.globalCompositeOperation='source-over';
    for(let i=0;i<3;i++){const ox=(Math.random()-.5)*state.size*2.2,oy=(Math.random()-.5)*state.size*2.2,rr=state.size*(.15+Math.random()*.35);
      ctx.fillStyle=spk[(Math.random()*spk.length)|0];ctx.beginPath();ctx.arc(p.x+ox,p.y+oy,rr,0,Math.PI*2);ctx.fill();}ctx.restore();}
  function seg(a,b,c){ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.quadraticCurveTo(b.x,b.y,c.x,c.y);ctx.lineWidth=state.size;
    if(state.tool==='eraser'){ctx.globalCompositeOperation='destination-out';ctx.strokeStyle='rgba(0,0,0,1)';}
    else{ctx.globalCompositeOperation='source-over';if(state.tool==='rainbow'){hue=(hue+8)%360;ctx.strokeStyle='hsl('+hue+',95%,55%)';}else ctx.strokeStyle=state.color;}
    ctx.stroke();}
  function dot(p){if(state.tool==='sparkle'){sparkleAt(p);return;}ctx.save();
    if(state.tool==='eraser'){ctx.globalCompositeOperation='destination-out';ctx.fillStyle='rgba(0,0,0,1)';}
    else{ctx.globalCompositeOperation='source-over';ctx.fillStyle=state.tool==='rainbow'?'hsl('+hue+',95%,55%)':state.color;}
    ctx.beginPath();ctx.arc(p.x,p.y,state.size/2,0,Math.PI*2);ctx.fill();ctx.restore();}

  canvas.addEventListener('pointerdown',e=>{e.preventDefault();canvas.setPointerCapture(e.pointerId);pushUndo();
    const p=pos(e);if(state.tool==='stamp'){placeStamp(p);return;}
    drawing=true;moved=false;prev=p;prevMid=p;if(state.tool==='sparkle')sparkleAt(p);});
  canvas.addEventListener('pointermove',e=>{if(!drawing)return;e.preventDefault();
    const evs=e.getCoalescedEvents?e.getCoalescedEvents():[e];
    for(const ev of evs){const p=pos(ev);moved=true;
      if(state.tool==='sparkle'){sparkleAt(p);prev=p;continue;}
      const m=mid(prev,p);seg(prevMid,prev,m);prev=p;prevMid=m;}});
  function end(){if(!drawing)return;if(!moved&&state.tool!=='sparkle')dot(prev);drawing=false;}
  canvas.addEventListener('pointerup',end);canvas.addEventListener('pointercancel',end);

  document.getElementById('undo').addEventListener('pointerdown',doUndo);
  const ask=document.getElementById('ask');
  document.getElementById('clearD').addEventListener('pointerdown',()=>ask.classList.add('on'));
  document.getElementById('askNo').addEventListener('pointerdown',()=>ask.classList.remove('on'));
  document.getElementById('askYes').addEventListener('pointerdown',()=>{pushUndo();
    ctx.save();ctx.setTransform(1,0,0,1,0,0);ctx.clearRect(0,0,canvas.width,canvas.height);ctx.restore();ask.classList.remove('on');});
  document.getElementById('saveD').addEventListener('pointerdown',()=>{
    const out=document.createElement('canvas');out.width=canvas.width;out.height=canvas.height;
    const o=out.getContext('2d');o.fillStyle='#fffdf7';o.fillRect(0,0,out.width,out.height);o.drawImage(canvas,0,0);
    const a=document.createElement('a');a.download='olivia-drawing.png';a.href=out.toDataURL('image/png');a.click();});

  window.addEventListener('resize',()=>{if(document.getElementById('doodle').classList.contains('active'))sizeCanvas();});
  return { onShow(){ sizeCanvas(); } };
})();

/* ===================== VIRUS HUNT ===================== */
const Virus = (function(){
  const canvas=document.getElementById('virusCanvas');
  const ctx=canvas.getContext('2d');
  const arena=document.getElementById('arena');
  const scoreEl=document.getElementById('vscore');
  const toast=document.getElementById('vtoast');
  let dpr=Math.max(1,Math.min(window.devicePixelRatio||1,2));
  let W=0,H=0,raf=null,running=false,last=0;
  let germs=[],parts=[],beams=[];
  let score=0,spawnT=0,gameT=0,lastMile=0;
  const cols=[['#7fd858','#3f8f28'],['#b07cff','#6a3fc0'],['#ff9a52','#d1631c'],
              ['#5ec6ff','#2b8fd1'],['#ff7eb6','#d83b86'],['#ff6b6b','#c93636']];

  function resize(){const r=arena.getBoundingClientRect();if(r.width===0)return;
    W=r.width;H=r.height;canvas.width=Math.round(W*dpr);canvas.height=Math.round(H*dpr);ctx.setTransform(dpr,0,0,dpr,0,0);}

  function spawn(){
    const c=cols[(Math.random()*cols.length)|0];
    const rad=26+Math.random()*16;
    germs.push({x:rad+Math.random()*(W-rad*2),y:-rad-10,r:rad,
      vy:(34+Math.random()*22)+score*0.5, phase:Math.random()*6.28, amp:14+Math.random()*22,
      spd:1.5+Math.random()*1.5, spikes:7+((Math.random()*5)|0), col:c, rot:Math.random()*6.28,
      blink:0, bx:Math.random()*W});
  }
  function explode(x,y,c){for(let i=0;i<16;i++){const a=Math.random()*6.28,s=60+Math.random()*180;
    parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,col:Math.random()<.5?c[0]:'#ffffff',r:3+Math.random()*4});}}

  function drawGerm(g){
    ctx.save();ctx.translate(g.x,g.y);ctx.rotate(Math.sin(gameT*1.5+g.phase)*0.15);
    // spikes
    ctx.fillStyle=g.col[1];
    for(let i=0;i<g.spikes;i++){const a=(i/g.spikes)*6.28;const sx=Math.cos(a)*g.r,sy=Math.sin(a)*g.r;
      ctx.beginPath();ctx.arc(sx,sy,g.r*0.28,0,6.28);ctx.fill();}
    // body
    const grd=ctx.createRadialGradient(-g.r*0.3,-g.r*0.3,g.r*0.2,0,0,g.r);
    grd.addColorStop(0,g.col[0]);grd.addColorStop(1,g.col[1]);
    ctx.fillStyle=grd;ctx.beginPath();ctx.arc(0,0,g.r,0,6.28);ctx.fill();
    // inner dots (microscope look)
    ctx.fillStyle='rgba(255,255,255,.25)';
    ctx.beginPath();ctx.arc(g.r*0.3,g.r*0.25,g.r*0.16,0,6.28);ctx.fill();
    ctx.beginPath();ctx.arc(-g.r*0.35,g.r*0.4,g.r*0.1,0,6.28);ctx.fill();
    // eyes
    const ey=-g.r*0.1,ex=g.r*0.34,er=g.r*0.26;const open=g.blink<=0;
    ctx.fillStyle='#fff';
    ctx.beginPath();ctx.arc(-ex,ey,er,0,6.28);ctx.fill();
    ctx.beginPath();ctx.arc(ex,ey,er,0,6.28);ctx.fill();
    ctx.fillStyle='#222';
    if(open){ctx.beginPath();ctx.arc(-ex,ey+er*0.15,er*0.5,0,6.28);ctx.fill();
      ctx.beginPath();ctx.arc(ex,ey+er*0.15,er*0.5,0,6.28);ctx.fill();}
    else{ctx.lineWidth=g.r*0.08;ctx.strokeStyle='#222';
      ctx.beginPath();ctx.moveTo(-ex-er*0.5,ey);ctx.lineTo(-ex+er*0.5,ey);
      ctx.moveTo(ex-er*0.5,ey);ctx.lineTo(ex+er*0.5,ey);ctx.stroke();}
    // smile
    ctx.strokeStyle='#222';ctx.lineWidth=g.r*0.09;ctx.lineCap='round';
    ctx.beginPath();ctx.arc(0,g.r*0.32,g.r*0.34,0.15*Math.PI,0.85*Math.PI);ctx.stroke();
    ctx.restore();
  }

  function drawBlaster(){
    const bx=W/2,by=H-6;
    ctx.save();ctx.translate(bx,by);
    // barrel toward last target
    const tgt=beams.length?beams[beams.length-1]:null;
    let ang=-Math.PI/2; if(tgt){ang=Math.atan2(tgt.y2-by,tgt.x2-bx);}
    ctx.save();ctx.rotate(ang);ctx.fillStyle='#caa6ff';
    ctx.beginPath();ctx.roundRect?ctx.roundRect(0,-9,46,18,9):ctx.rect(0,-9,46,18);ctx.fill();
    ctx.fillStyle='#7be3ff';ctx.beginPath();ctx.arc(46,0,7,0,6.28);ctx.fill();ctx.restore();
    // body
    const g=ctx.createLinearGradient(0,-46,0,0);g.addColorStop(0,'#7be3ff');g.addColorStop(1,'#2b8fd1');
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(0,-14,30,Math.PI,0);ctx.lineTo(34,0);ctx.lineTo(-34,0);ctx.closePath();ctx.fill();
    ctx.fillStyle='#0c2433';ctx.beginPath();ctx.arc(0,-20,9,0,6.28);ctx.fill();
    ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(-3,-23,3.2,0,6.28);ctx.fill();
    ctx.restore();
  }

  function update(dt){
    gameT+=dt; spawnT+=dt;
    const interval=Math.max(0.45,1.15-score*0.012);
    if(spawnT>interval){spawnT=0;spawn();}
    for(const g of germs){
      g.y+=g.vy*dt;
      g.x=g.bx+Math.sin(gameT*g.spd+g.phase)*g.amp;
      g.blink-=dt; if(g.blink<-3) g.blink=0.15; // occasional blink
    }
    germs=germs.filter(g=>g.y<H+g.r+40);
    for(const p of parts){p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=300*dt;p.life-=dt*1.6;}
    parts=parts.filter(p=>p.life>0);
    for(const b of beams){b.life-=dt*7;}
    beams=beams.filter(b=>b.life>0);
  }
  function render(){
    ctx.clearRect(0,0,W,H);
    for(const b of beams){ctx.save();ctx.globalAlpha=Math.max(0,b.life);
      ctx.strokeStyle='#aef3ff';ctx.lineWidth=6;ctx.lineCap='round';ctx.shadowColor='#7be3ff';ctx.shadowBlur=16;
      ctx.beginPath();ctx.moveTo(b.x1,b.y1);ctx.lineTo(b.x2,b.y2);ctx.stroke();ctx.restore();}
    for(const g of germs)drawGerm(g);
    for(const p of parts){ctx.save();ctx.globalAlpha=Math.max(0,p.life);ctx.fillStyle=p.col;
      ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,6.28);ctx.fill();ctx.restore();}
    drawBlaster();
  }
  function loop(ts){if(!running)return;const dt=last?Math.min(0.05,(ts-last)/1000):0;last=ts;
    update(dt);render();raf=requestAnimationFrame(loop);}

  function onTap(e){
    const r=canvas.getBoundingClientRect();const x=e.clientX-r.left,y=e.clientY-r.top;
    let hit=null,hi=1e9;
    for(let i=germs.length-1;i>=0;i--){const g=germs[i];const d=Math.hypot(g.x-x,g.y-y);
      if(d<g.r*1.2 && d<hi){hi=d;hit=i;}}
    beams.push({x1:W/2,y1:H-30,x2:x,y2:y,life:1});
    if(hit!==null){const g=germs[hit];explode(g.x,g.y,g.col);germs.splice(hit,1);
      score++;scoreEl.textContent=score;popSound();
      if(score>0 && score%10===0 && score!==lastMile){lastMile=score;cheer();showToast('🎉 '+score+' germs! 🎉');}
    } else { zapSound(); }
  }
  let toastT=null;
  function showToast(txt){toast.textContent=txt;toast.classList.add('show');
    clearTimeout(toastT);toastT=setTimeout(()=>toast.classList.remove('show'),1100);}

  canvas.addEventListener('pointerdown',e=>{e.preventDefault();ac();onTap(e);});
  document.getElementById('vrestart').addEventListener('pointerdown',()=>{germs=[];parts=[];beams=[];score=0;lastMile=0;scoreEl.textContent='0';});
  window.addEventListener('resize',()=>{if(running)resize();});

  return {
    start(){resize();germs=[];parts=[];beams=[];score=0;lastMile=0;scoreEl.textContent='0';
      gameT=0;spawnT=0;last=0;running=true;for(let i=0;i<3;i++)spawn();raf=requestAnimationFrame(loop);},
    stop(){running=false;if(raf)cancelAnimationFrame(raf);raf=null;}
  };
})();

/* ===================== LETTER LAND ===================== */
const Letters = (function(){
  const tray=document.getElementById('tray');
  const strip=document.getElementById('wordStrip');
  let word=[];
  const letters='ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');

  // build tray
  letters.forEach(L=>{const b=document.createElement('button');b.className='ltile';b.textContent=L;b.dataset.l=L;
    attachDrag(b,L);tray.appendChild(b);});

  function renderWord(){
    strip.innerHTML='';
    if(word.length===0){const s=document.createElement('span');s.className='ph';s.textContent='Tap or drag letters here ✨';strip.appendChild(s);return;}
    word.forEach((L,i)=>{const t=document.createElement('div');t.className='wtile';t.textContent=L;
      t.addEventListener('pointerdown',()=>{word.splice(i,1);renderWord();});strip.appendChild(t);});
  }
  function add(L){word.push(L);renderWord();speak(L);}

  // tap + drag for each tray tile
  function attachDrag(el,L){
    let sx,sy,ghost=null,movedFar=false,pid=null;
    el.addEventListener('pointerdown',e=>{e.preventDefault();ac();pid=e.pointerId;sx=e.clientX;sy=e.clientY;movedFar=false;
      el.setPointerCapture(pid);
      ghost=document.createElement('div');ghost.className='ghost';ghost.textContent=L;
      ghost.style.left=e.clientX+'px';ghost.style.top=e.clientY+'px';document.body.appendChild(ghost);});
    el.addEventListener('pointermove',e=>{if(!ghost)return;
      if(Math.hypot(e.clientX-sx,e.clientY-sy)>10)movedFar=true;
      ghost.style.left=e.clientX+'px';ghost.style.top=e.clientY+'px';});
    function done(e){if(!ghost)return;
      const overStrip=()=>{const r=strip.getBoundingClientRect();return e.clientX>=r.left&&e.clientX<=r.right&&e.clientY>=r.top&&e.clientY<=r.bottom;};
      if(!movedFar || overStrip()) add(L);   // tap = add, or drop onto the word box = add
      ghost.remove();ghost=null;}
    el.addEventListener('pointerup',done);
    el.addEventListener('pointercancel',e=>{if(ghost){ghost.remove();ghost=null;}});
  }

  document.getElementById('sayWord').addEventListener('pointerdown',()=>{if(word.length)speak(word.join(''));});
  document.getElementById('backspace').addEventListener('pointerdown',()=>{word.pop();renderWord();});
  document.getElementById('clearWord').addEventListener('pointerdown',()=>{word=[];renderWord();});

  // mode toggle
  const buildBtn=document.getElementById('modeBuild'),cardBtn=document.getElementById('modeCards');
  const buildV=document.getElementById('buildView'),cardV=document.getElementById('cardsView');
  buildBtn.addEventListener('pointerdown',()=>{buildBtn.classList.add('sel');cardBtn.classList.remove('sel');buildV.classList.add('on');cardV.classList.remove('on');});
  cardBtn.addEventListener('pointerdown',()=>{cardBtn.classList.add('sel');buildBtn.classList.remove('sel');cardV.classList.add('on');buildV.classList.remove('on');renderCard();});

  // flashcards
  const deck=[['A','🍎','Apple'],['B','🐻','Bear'],['C','🐱','Cat'],['D','🐶','Dog'],['E','🐘','Elephant'],
    ['F','🐟','Fish'],['G','🦒','Giraffe'],['H','🏠','House'],['I','🍦','Ice cream'],['J','🧃','Juice'],
    ['K','🪁','Kite'],['L','🦁','Lion'],['M','🌙','Moon'],['N','👃','Nose'],['O','🐙','Octopus'],
    ['P','🐧','Penguin'],['Q','👑','Queen'],['R','🌈','Rainbow'],['S','☀️','Sun'],['T','🌳','Tree'],
    ['U','☂️','Umbrella'],['V','🎻','Violin'],['W','🍉','Watermelon'],['X','🩻','X-ray'],['Y','🪀','Yo-yo'],['Z','🦓','Zebra']];
  let ci=0;const card=document.getElementById('card');
  function renderCard(){const d=deck[ci];
    card.innerHTML='<div class="big">'+d[0]+'</div><div class="pic">'+d[1]+'</div><div class="word">'+d[2]+'</div>';}
  function sayCard(){const d=deck[ci];speak(d[0]+'. '+d[2]);}
  card.addEventListener('pointerdown',()=>{ac();sayCard();});
  document.getElementById('sayCard').addEventListener('pointerdown',e=>{e.stopPropagation();ac();sayCard();});
  document.getElementById('nextCard').addEventListener('pointerdown',()=>{ci=(ci+1)%deck.length;renderCard();sayCard();});
  document.getElementById('prevCard').addEventListener('pointerdown',()=>{ci=(ci-1+deck.length)%deck.length;renderCard();sayCard();});

  renderWord();renderCard();
  return { onShow(){ /* nothing to size */ } };
})();
</script>
